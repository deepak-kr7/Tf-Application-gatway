trigger:
  branches:
    include:
      - main

pool:
  name: 'NewAgent pool'

variables:
  workingDir: '$(System.DefaultWorkingDirectory)/environments/dev'
  serviceConnection: 'demopipline'
  resourceGroup: 'demo_rg'
  storageAccount: 'demostg1344'
  containerName: 'democ'
  stateFile: 'dev.tfstate'

stages:

#=========================================================
# Stage 1 - Terraform Init
#=========================================================
- stage: Init
  displayName: "Terraform Init"

  jobs:
  - job: Init
    displayName: "Initialize Terraform"

    steps:
    - checkout: self

    - task: TerraformTask@5
      displayName: "Terraform Init"
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(workingDir)'
        backendServiceArm: '$(serviceConnection)'
        backendAzureRmResourceGroupName: '$(resourceGroup)'
        backendAzureRmStorageAccountName: '$(storageAccount)'
        backendAzureRmContainerName: '$(containerName)'
        backendAzureRmKey: '$(stateFile)'

#=========================================================
# Stage 2 - Terraform Security Scan (Consolidated Task)
#=========================================================
- stage: SecurityScan
  displayName: "Terraform Security Scan"
  dependsOn: Init

  jobs:
  - job: SecurityScan
    displayName: "Run Security Tools"

    steps:
    - checkout: self

    # Single combined task to run all security tools
    - powershell: |
        $ErrorActionPreference = "Continue"
        
        # Create reports folder
        mkdir -p reports

        Write-Host "1. Terraform Init + Validate..."
        terraform init -backend=false -input=false
        terraform validate | Out-File reports/terraform_validate.txt

        Write-Host "2. Terraform Format Check..."
        terraform fmt -check -recursive | Out-File reports/terraform_fmt.txt

        Write-Host "3. TFLint..."
        tflint --init
        tflint --format json > reports/tflint.json

        Write-Host "4. Checkov..."
        checkov -d . -o json > reports/checkov.json

        Write-Host "5. tfsec..."
        tfsec . --format json --out reports/tfsec.json

        Write-Host "6. Terrascan..."
        terrascan scan -d . -o json > reports/terrascan.json

        Write-Host "7. Semgrep..."
        semgrep scan --config auto --exclude reports --exclude .terraform --json --output reports/semgrep.json .

        Write-Host "8. Gitleaks..."
        gitleaks detect --source . --report-format json --report-path reports/gitleaks.json

        Write-Host "9. TruffleHog..."
        trufflehog filesystem . --json > reports/trufflehog.json

        Write-Host "10. Infracost..."
        infracost breakdown --path . --format json --out-file reports/infracost.json

        # Reset exit code so script doesn't fail task
        exit 0
      displayName: "Run All Security Scans"
      workingDirectory: "$(workingDir)"
      continueOnError: true

    # Publish Reports (Fixed path with forward slash)
    - task: PublishBuildArtifacts@1
      displayName: "Publish Security Reports"
      inputs:
        PathtoPublish: "$(workingDir)/reports"
        ArtifactName: "SecurityReports"

#=========================================================
# Stage 3 - Terraform Plan
#=========================================================
- stage: Plan
  displayName: "Terraform Plan"
  dependsOn: SecurityScan

  jobs:
  - job: Plan
    displayName: "Terraform Plan"

    steps:
    - checkout: self

    - task: TerraformTask@5
      displayName: "Terraform Init"
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(workingDir)'
        backendServiceArm: '$(serviceConnection)'
        backendAzureRmResourceGroupName: '$(resourceGroup)'
        backendAzureRmStorageAccountName: '$(storageAccount)'
        backendAzureRmContainerName: '$(containerName)'
        backendAzureRmKey: '$(stateFile)'

    - task: TerraformTask@5
      displayName: "Terraform Plan"
      inputs:
        provider: 'azurerm'
        command: 'plan'
        workingDirectory: '$(workingDir)'
        environmentServiceNameAzureRM: '$(serviceConnection)'
        commandOptions: '-out=tfplan'