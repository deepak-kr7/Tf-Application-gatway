trigger:
  branches:
    include:
      - main

pool:
  name: 'NewAgent pool'

variables:
  workingDir: '$(System.DefaultWorkingDirectory)/environments/dev'
  serviceConnection: 'demopipline'
  resourceGroup: 'demo_rg'
  storageAccount: 'demostg1344'
  containerName: 'democ'
  stateFile: 'dev.tfstate'

stages:

#=========================================================
# STAGE 1: CI - Security Scan & Audit
#=========================================================
- stage: SecurityScan
  displayName: "CI - Security Scan & Audit"

  jobs:
  - job: SecurityScan
    displayName: "Run Security Tools"

    steps:
    - checkout: self

    - powershell: |
        $ErrorActionPreference = "Continue"
        mkdir -p reports

        Write-Host "1. Terraform Init & Validate..."
        terraform init -backend=false -input=false
        terraform validate | Out-File reports/terraform_validate.txt

        Write-Host "2. Terraform Format Check..."
        terraform fmt -check -recursive | Out-File reports/terraform_fmt.txt

        Write-Host "3. TFLint..."
        tflint --init
        tflint --format json > reports/tflint.json

        Write-Host "4. Checkov..."
        checkov -d . -o json > reports/checkov.json

        Write-Host "5. tfsec..."
        tfsec . --format json --out reports/tfsec.json

        Write-Host "6. Terrascan..."
        terrascan scan -d . -o json > reports/terrascan.json

        Write-Host "7. Semgrep..."
        semgrep scan --config auto --exclude reports --exclude .terraform --json --output reports/semgrep.json .

        Write-Host "8. Gitleaks..."
        gitleaks detect --source . --report-format json --report-path reports/gitleaks.json

        Write-Host "9. TruffleHog..."
        trufflehog filesystem . --json > reports/trufflehog.json

        Write-Host "10. Infracost..."
        infracost breakdown --path . --format json --out-file reports/infracost.json

        exit 0
      displayName: "Run Security Scans"
      workingDirectory: "$(workingDir)"
      continueOnError: true

    - task: PublishBuildArtifacts@1
      displayName: "Publish Security Reports"
      inputs:
        PathtoPublish: "$(workingDir)/reports"
        ArtifactName: "SecurityReports"

#=========================================================
# STAGE 2: CI - Terraform Build & Save Plan Artifact
#=========================================================
- stage: Plan
  displayName: "CI - Build & Terraform Plan"
  dependsOn: SecurityScan

  jobs:
  - job: Plan
    displayName: "Generate Terraform Plan"

    steps:
    - checkout: self

    - task: TerraformTask@5
      displayName: "Terraform Init"
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(workingDir)'
        backendServiceArm: '$(serviceConnection)'
        backendAzureRmResourceGroupName: '$(resourceGroup)'
        backendAzureRmStorageAccountName: '$(storageAccount)'
        backendAzureRmContainerName: '$(containerName)'
        backendAzureRmKey: '$(stateFile)'

    # Generate Plan File (Build Step)
    - task: TerraformTask@5
      displayName: "Terraform Plan"
      inputs:
        provider: 'azurerm'
        command: 'plan'
        workingDirectory: '$(workingDir)'
        environmentServiceNameAzureRM: '$(serviceConnection)'
        commandOptions: '-out=$(workingDir)/tfplan'

    # Save Plan File as Pipeline Artifact
    - publish: $(workingDir)/tfplan
      artifact: tfplan
      displayName: "Save Terraform Plan Artifact"

#=========================================================
# STAGE 3: CD - Terraform Apply (Deployment)
#=========================================================
- stage: Apply
  displayName: "CD - Deploy Infrastructure"
  dependsOn: Plan
  condition: succeeded()

  jobs:
  - deployment: Apply
    displayName: "Terraform Apply"
    environment: 'dev-environment'  # Azure DevOps Environment (for Approvals)
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self

          # Download saved Plan Artifact from CI Stage
          - download: current
            artifact: tfplan
            displayName: "Download Saved Plan Artifact"

          - task: TerraformTask@5
            displayName: "Terraform Init"
            inputs:
              provider: 'azurerm'
              command: 'init'
              workingDirectory: '$(workingDir)'
              backendServiceArm: '$(serviceConnection)'
              backendAzureRmResourceGroupName: '$(resourceGroup)'
              backendAzureRmStorageAccountName: '$(storageAccount)'
              backendAzureRmContainerName: '$(containerName)'
              backendAzureRmKey: '$(stateFile)'

          # Copy plan file to working directory
          - powershell: |
              Copy-Item "$(Pipeline.Workspace)/tfplan/tfplan" -Destination "$(workingDir)/tfplan"
            displayName: "Prepare Plan File for Apply"

          # Apply using exact saved plan
          - task: TerraformTask@5
            displayName: "Terraform Apply"
            inputs:
              provider: 'azurerm'
              command: 'apply'
              workingDirectory: '$(workingDir)'
              environmentServiceNameAzureRM: '$(serviceConnection)'
              commandOptions: 'tfplan'