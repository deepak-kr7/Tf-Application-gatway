trigger:
  branches:
    include:
      - main

pool:
  name: 'NewAgent pool'

variables:
  workingDir: '$(System.DefaultWorkingDirectory)/environments/dev'
  serviceConnection: 'demopipline'
  resourceGroup: 'demo_rg'
  storageAccount: 'demostg1344'
  containerName: 'democ'
  stateFile: 'dev.tfstate'

stages:

#=========================================================
# Stage 1 - Terraform Init
#=========================================================
- stage: Init
  displayName: "Terraform Init"

  jobs:
  - job: Init
    displayName: "Initialize Terraform"

    steps:
    - checkout: self

    - task: TerraformTask@5
      displayName: "Terraform Init"
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(workingDir)'
        backendServiceArm: '$(serviceConnection)'
        backendAzureRmResourceGroupName: '$(resourceGroup)'
        backendAzureRmStorageAccountName: '$(storageAccount)'
        backendAzureRmContainerName: '$(containerName)'
        backendAzureRmKey: '$(stateFile)'

#=========================================================
# Stage 2 - Terraform Security Scan
#=========================================================
- stage: SecurityScan
  displayName: "Terraform Security Scan"
  dependsOn: Init

  jobs:
  - job: SecurityScan
    displayName: "Run Security Tools"

    steps:
    - checkout: self

    # Create Reports Folder
    - task: PowerShell@2
      displayName: "Create Reports Folder"
      inputs:
        targetType: inline
        script: |
          New-Item -ItemType Directory -Force "$(workingDir)\reports" | Out-Null

    # Terraform Init + Validate
    - task: PowerShell@2
      displayName: "Terraform Init + Validate"
      continueOnError: true
      inputs:
        targetType: inline
        workingDirectory: "$(workingDir)"
        script: |
          terraform init -backend=false -input=false
          terraform validate | Out-File reports\terraform_validate.txt

    # Terraform Format
    - task: PowerShell@2
      displayName: "Terraform Format Check"
      continueOnError: true
      inputs:
        targetType: inline
        workingDirectory: "$(workingDir)"
        script: |
          terraform fmt -check -recursive | Out-File reports\terraform_fmt.txt

    # TFLint
    - task: PowerShell@2
      displayName: "TFLint"
      continueOnError: true
      inputs:
        targetType: inline
        workingDirectory: "$(workingDir)"
        script: |
          tflint --init
          tflint --format json > reports\tflint.json

    # Checkov
    - task: PowerShell@2
      displayName: "Checkov"
      continueOnError: true
      inputs:
        targetType: inline
        workingDirectory: "$(workingDir)"
        script: |
          checkov -d . -o json > reports\checkov.json

    # tfsec
    - task: PowerShell@2
      displayName: "tfsec"
      continueOnError: true
      inputs:
        targetType: inline
        workingDirectory: "$(workingDir)"
        script: |
          tfsec . --format json --out reports\tfsec

    # Terrascan
    - task: PowerShell@2
      displayName: "Terrascan"
      continueOnError: true
      inputs:
        targetType: inline
        workingDirectory: "$(workingDir)"
        script: |
          terrascan scan -d . -o json > reports\terrascan.json

    # Semgrep
    - task: PowerShell@2
      displayName: "Semgrep"
      continueOnError: true
      inputs:
        targetType: inline
        workingDirectory: "$(workingDir)"
        script: |
          semgrep scan --config auto --exclude reports --exclude .terraform --json --output reports\semgrep.json .

    # Gitleaks
    - task: PowerShell@2
      displayName: "Gitleaks"
      continueOnError: true
      inputs:
        targetType: inline
        workingDirectory: "$(workingDir)"
        script: |
          gitleaks detect --source . --report-format json --report-path reports\gitleaks.json

    # TruffleHog
    - task: PowerShell@2
      displayName: "TruffleHog"
      continueOnError: true
      inputs:
        targetType: inline
        workingDirectory: "$(workingDir)"
        script: |
          trufflehog filesystem . --json > reports\trufflehog.json

    # Infracost
    - task: PowerShell@2
      displayName: "Infracost"
      continueOnError: true
      inputs:
        targetType: inline
        workingDirectory: "$(workingDir)"
        script: |
          infracost scan --path . --format json --out-file reports\infracost.json

    # Publish Reports
    - task: PublishBuildArtifacts@1
      displayName: "Publish Security Reports"
      inputs:
        PathtoPublish: "$(workingDir)\reports"
        ArtifactName: "SecurityReports"

#=========================================================
# Stage 3 - Terraform Plan
#=========================================================
- stage: Plan
  displayName: "Terraform Plan"
  dependsOn: SecurityScan

  jobs:
  - job: Plan
    displayName: "Terraform Plan"

    steps:
    - checkout: self

    - task: TerraformTask@5
      displayName: "Terraform Init"
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(workingDir)'
        backendServiceArm: '$(serviceConnection)'
        backendAzureRmResourceGroupName: '$(resourceGroup)'
        backendAzureRmStorageAccountName: '$(storageAccount)'
        backendAzureRmContainerName: '$(containerName)'
        backendAzureRmKey: '$(stateFile)'

    - task: TerraformTask@5
      displayName: "Terraform Plan"
      inputs:
        provider: 'azurerm'
        command: 'plan'
        workingDirectory: '$(workingDir)'
        environmentServiceNameAzureRM: '$(serviceConnection)'
        commandOptions: '-out=tfplan'

