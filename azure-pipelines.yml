trigger:
  branches:
    include:
      - main

pool:
  name: 'NewAgent pool'

variables:
  workingDir: '$(System.DefaultWorkingDirectory)/environments/dev'
  serviceConnection: 'demopipline'
  resourceGroup: 'demo_rg'
  storageAccount: 'demostg1344'
  containerName: 'democ'
  stateFile: 'dev.tfstate'

stages:

#=========================================================
# Stage 1 - Terraform Init
#=========================================================
- stage: Init
  displayName: "Terraform Init"

  jobs:
  - job: Init
    displayName: "Initialize Terraform"

    steps:
    - checkout: self

    - task: TerraformTask@5
      displayName: "Terraform Init"
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(workingDir)'
        backendServiceArm: '$(serviceConnection)'
        backendAzureRmResourceGroupName: '$(resourceGroup)'
        backendAzureRmStorageAccountName: '$(storageAccount)'
        backendAzureRmContainerName: '$(containerName)'
        backendAzureRmKey: '$(stateFile)'

#=========================================================
# Stage 2 - Terraform Plan
#=========================================================
- stage: Plan
  displayName: "Terraform Plan"
  dependsOn: Init

  jobs:
  - job: Plan
    displayName: "Terraform Plan"

    steps:
    - checkout: self

    - task: TerraformTask@5
      displayName: "Terraform Init"
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(workingDir)'
        backendServiceArm: '$(serviceConnection)'
        backendAzureRmResourceGroupName: '$(resourceGroup)'
        backendAzureRmStorageAccountName: '$(storageAccount)'
        backendAzureRmContainerName: '$(containerName)'
        backendAzureRmKey: '$(stateFile)'

    - task: TerraformTask@5
      displayName: "Terraform Plan"
      inputs:
        provider: 'azurerm'
        command: 'plan'
        workingDirectory: '$(workingDir)'
        environmentServiceNameAzureRM: '$(serviceConnection)'
        commandOptions: '-out=tfplan'

#=========================================================
# Stage 3 - Terraform Apply
#=========================================================
- stage: Apply
  displayName: "Terraform Apply"
  dependsOn: Plan

  jobs:
  - job: Apply
    displayName: "Terraform Apply"

    steps:
    - checkout: self

    - task: TerraformTask@5
      displayName: "Terraform Init"
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(workingDir)'
        backendServiceArm: '$(serviceConnection)'
        backendAzureRmResourceGroupName: '$(resourceGroup)'
        backendAzureRmStorageAccountName: '$(storageAccount)'
        backendAzureRmContainerName: '$(containerName)'
        backendAzureRmKey: '$(stateFile)'

    - task: TerraformTask@5
      displayName: "Terraform Apply"
      inputs:
        provider: 'azurerm'
        command: 'apply'
        workingDirectory: '$(workingDir)'
        environmentServiceNameAzureRM: '$(serviceConnection)'
        commandOptions: '-auto-approve'