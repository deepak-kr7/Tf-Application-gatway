trigger: none

pool:
  name: 'NewAgent pool'

variables:
  workingDir: '$(System.DefaultWorkingDirectory)/environments/dev'

stages:

#========================
# Stage 1 - Terraform Init
#========================
- stage: Init
  displayName: 'Terraform Init'

  jobs:
  - job: Init
    displayName: 'Initialize Terraform'

    steps:

    - checkout: self

    - task: TerraformTask@5
      displayName: 'Terraform Init'
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(workingDir)'
        backendServiceArm: 'demopipline'
        backendAzureRmResourceGroupName: 'demo_rg'
        backendAzureRmStorageAccountName: 'demostg1344'
        backendAzureRmContainerName: 'democ'
        backendAzureRmKey: 'dev.tfstate'


#========================
# Stage 2 - Terraform Plan
#========================
- stage: Plan
  displayName: 'Terraform Plan'
  dependsOn: Init

  jobs:
  - job: Plan
    displayName: 'Create Execution Plan'

    steps:

    - checkout: self

    - task: TerraformTask@5
      displayName: 'Terraform Plan'
      inputs:
        provider: 'azurerm'
        command: 'plan'
        workingDirectory: '$(workingDir)'
        environmentServiceNameAzureRM: 'demopipline'
        commandOptions: '-out=tfplan'


#========================
# Stage 3 - Terraform Apply
#========================
- stage: Apply
  displayName: 'Terraform Apply'
  dependsOn: Plan

  jobs:
  - job: Apply
    displayName: 'Deploy Infrastructure'

    steps:

    - checkout: self

    - task: TerraformTask@5
      displayName: 'Terraform Apply'
      inputs:
        provider: 'azurerm'
        command: 'apply'
        workingDirectory: '$(workingDir)'
        environmentServiceNameAzureRM: 'demopipline'
        commandOptions: '--auto-approve'